name: Release core

on:
  workflow_call:
    inputs:
      release_tag:
        description: Release tag to stamp into the desktop app version.
        required: true
        type: string
      target_ref:
        description: Commit SHA or ref to build and release.
        required: true
        type: string
      publish:
        description: Whether to upload validated artifacts to a draft GitHub release.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - name: Ensure release commit points to main
        run: |
          git fetch origin main:refs/remotes/origin/main
          git merge-base --is-ancestor HEAD refs/remotes/origin/main

  build-mac-release:
    needs: verify
    runs-on: macos-15
    concurrency:
      group: release-${{ inputs.release_tag }}-mac
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/desktop/package-lock.json
            apps/ade-cli/package-lock.json

      - name: Install desktop dependencies
        run: cd apps/desktop && npm ci

      - name: Install ADE CLI dependencies
        run: cd apps/ade-cli && npm ci

      - name: Stamp release version
        env:
          ADE_RELEASE_TAG: ${{ inputs.release_tag }}
        run: cd apps/desktop && npm run version:release

      - name: Reset release output
        run: |
          rm -rf apps/desktop/release apps/desktop/.cache
          mkdir -p apps/desktop/.cache

      - name: Materialize App Store Connect API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          if [ -z "$APPLE_API_KEY_P8" ] || [ -z "$APPLE_API_KEY_ID" ]; then
            echo "::error::Missing APPLE_API_KEY_P8 or APPLE_API_KEY_ID GitHub secret."
            exit 1
          fi

          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Seed x64 runtime payload into universal build inputs
        run: |
          cd apps/desktop
          npm run prepare:mac:universal

      - name: Build signed universal macOS release
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          ELECTRON_CACHE: ${{ github.workspace }}/apps/desktop/.cache/electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/apps/desktop/.cache/electron-builder
        run: cd apps/desktop && npm run dist:mac:universal:signed

      - name: Notarize and staple DMG artifact
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: cd apps/desktop && npm run notarize:mac:dmg

      - name: Validate macOS release artifacts and runtime payloads
        run: cd apps/desktop && npm run validate:mac:artifacts

      - name: Upload validated artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: ade-mac-release-${{ inputs.release_tag }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*-mac.zip.blockmap
            apps/desktop/release/latest-mac.yml
          if-no-files-found: error

  build-win-release:
    needs: verify
    runs-on: windows-latest
    concurrency:
      group: release-${{ inputs.release_tag }}-win
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/desktop/package-lock.json
            apps/ade-cli/package-lock.json

      - name: Install desktop dependencies
        run: cd apps/desktop && npm ci

      - name: Install ADE CLI dependencies
        run: cd apps/ade-cli && npm ci

      - name: Stamp release version
        env:
          ADE_RELEASE_TAG: ${{ inputs.release_tag }}
        run: cd apps/desktop && npm run version:release

      - name: Reset release output
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force apps/desktop/release, apps/desktop/.cache -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path apps/desktop/.cache | Out-Null

      - name: Build and validate Windows release
        env:
          ELECTRON_CACHE: ${{ github.workspace }}\apps\desktop\.cache\electron
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\apps\desktop\.cache\electron-builder
        run: cd apps/desktop && npm run dist:win

      - name: Upload validated Windows artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: ade-win-release-${{ inputs.release_tag }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.exe.blockmap
            apps/desktop/release/latest.yml
          if-no-files-found: error

  publish-release:
    if: ${{ inputs.publish }}
    needs:
      - build-mac-release
      - build-win-release
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS release artifacts
        uses: actions/download-artifact@v4
        with:
          name: ade-mac-release-${{ inputs.release_tag }}
          path: release-assets/mac

      - name: Download Windows release artifacts
        uses: actions/download-artifact@v4
        with:
          name: ade-win-release-${{ inputs.release_tag }}
          path: release-assets/win

      - name: Create or update draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.release_tag }}
          TARGET_REF: ${{ inputs.target_ref }}
        run: |
          shopt -s nullglob
          files=(
            release-assets/mac/*.dmg
            release-assets/mac/*.zip
            release-assets/mac/*-mac.zip.blockmap
            release-assets/mac/latest-mac.yml
            release-assets/win/*.exe
            release-assets/win/*.exe.blockmap
            release-assets/win/latest.yml
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release artifacts were found after validation."
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${files[@]}" \
              --draft \
              --title "$TAG_NAME" \
              --generate-notes \
              --target "$TARGET_REF"
          fi
