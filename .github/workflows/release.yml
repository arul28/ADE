name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish, for example v1.2.3.
        required: true
        type: string
      target_sha:
        description: Commit SHA to publish for this release.
        required: true
        type: string

permissions:
  contents: write

jobs:
  run-release:
    uses: ./.github/workflows/release-core.yml
    with:
      release_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
      target_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.target_sha || github.ref }}
      publish: true
    secrets: inherit
