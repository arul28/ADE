name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  build-mac:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: macos-latest
    concurrency:
      group: release-main
      cancel-in-progress: true
    env:
      ELECTRON_CACHE: ${{ runner.temp }}/electron
      ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/desktop/package-lock.json
            apps/mcp-server/package-lock.json

      - name: Install desktop dependencies
        run: cd apps/desktop && npm ci

      - name: Install MCP server dependencies
        run: cd apps/mcp-server && npm ci

      - name: Stamp CI version
        env:
          ADE_BUILD_NUMBER: ${{ github.event.workflow_run.run_number }}
        run: cd apps/desktop && npm run version:ci

      - name: Build and publish macOS release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd apps/desktop && npm run release:mac
